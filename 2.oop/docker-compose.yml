services:
  nginx:
    image: nginx:1.30.0-alpine
    container_name: app_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app_network
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: app_php
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    networks:
      - app_network
  mysql:
    image: mysql:8.0
    container_name: app_mysql
    restart: unless-stopped
    ports:
        - "33060:3306"       # FOR DEBUG !!!
    networks:
        - app_network
    volumes:
        - mysql_data:/var/lib/mysql
    environment:
        MYSQL_ROOT_PASSWORD: rootpassword
        MYSQL_DATABASE: app_db
        MYSQL_USER: appuser
        MYSQL_PASSWORD: apppassword
    healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
        start_period: 5s
        interval: 5s
        timeout: 5s
        retries: 5

networks:
  app_network:
    driver: bridge
volumes:
  mysql_data:
    driver: local